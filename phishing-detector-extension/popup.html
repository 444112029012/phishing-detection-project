<!DOCTYPE html>
<html>

  <style>
    body {
      width: 350px;
      /* 稍微加寬以容納更多資訊 */
      font-family: sans-serif;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    textarea {
      width: 98%;
      height: 150px;
      /* 為兩個文字區塊設定高度 */
      margin-top: 5px;
    }

    input[type="text"] {
      width: 98%;
      margin-top: 5px;
    }

    label {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h2>釣魚風險評估</h2>

  <button id="scanButton" style="width: 100%; padding: 10px; font-size: 16px;">

  <script src="popup.js"></script>

</html>
